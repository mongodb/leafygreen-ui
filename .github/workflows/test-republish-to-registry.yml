name: Test Registry Republish

# Manual smoke test for scripts/republish-to-registry.mjs, so the CodeArtifact
# publish path (UXE-477 / LG-6236) can be exercised with real credentials without
# waiting for an actual release. Pick a package/version already published to both
# npmjs and CodeArtifact — the script treats "already published" as a no-op, so
# this succeeds (not just "fails harmlessly") while still proving the fetch, auth,
# and scope-registry check all work end-to-end. A genuine problem (bad auth, pack
# 404, scope mismatch) still fails the step.
on:
  workflow_dispatch:
    inputs:
      package_name:
        description: 'Package to test with, e.g. @leafygreen-ui/a11y'
        required: true
      package_version:
        description: 'Version to test with, e.g. 3.0.5'
        required: true

jobs:
  test-republish:
    name: Republish a single package
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Use Node 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          aws-access-key-id: ${{ secrets.AWS_CODEARTIFACT_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_CODEARTIFACT_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to CodeArtifact
        id: login-codeartifact
        run: scripts/login-codeartifact.sh

      - name: Publish to CodeArtifact
        env:
          PACKAGE_NAME: ${{ inputs.package_name }}
          PACKAGE_VERSION: ${{ inputs.package_version }}
        run: |
          PACKAGES=$(node -e "console.log(JSON.stringify([{name: process.env.PACKAGE_NAME, version: process.env.PACKAGE_VERSION}]))")
          node scripts/republish-to-registry.mjs "${{ steps.login-codeartifact.outputs.registry }}" "$PACKAGES"
